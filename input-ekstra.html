<title>Input Peserta Ekstrakurikuler</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<!-- Tom Select -->
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- CSS External -->
<link rel="stylesheet" href="assets/css/style2.css">

</head>

<body onload="onLoad()">

<div class="page-shell">
  <div class="page-content">
    <div class="page-wrap">

      <!-- LOGO -->
      <img class="logo" src="assets/img/Logo.png">

      <div class="brand">
        <p class="school-name">SMK BINTANG PERSADA DENPASAR</p>
        <p class="school-sub">Form Input Peserta Ekstrakurikuler</p>
      </div>

      <!-- HERO -->
      <div class="hero">
        <p class="hero-title">INPUT PESERTA EKSTRA</p>
        <p class="hero-sub"><strong>Semua Jenjang</strong></p>
        <div class="pill">
          <i class="fa-solid fa-circle-info"></i>
          Pastikan data diisi dengan benar
        </div>
      </div>

      <!-- FORM -->
      <form id="FormInput" class="card">
        <div class="card-head">
          <h3>
            <i class="fa-solid fa-id-card-clip me-2"></i>
            Identitas Siswa & Ekstra Pilihan
          </h3>
        </div>

        <div class="card-body">

          <div class="grid">

            <!-- KELAS -->
            <div class="field">
              <label>Kelas</label>
              <select class="form-control" id="rombel" required>
                <option disabled selected>Pilih Kelas</option>
              </select>
            </div>

            <!-- SISWA -->
            <div class="field">
              <label>Nama Siswa</label>
              <select class="form-control" id="siswa" required>
                <option disabled selected>Pilih Siswa</option>
              </select>
            </div>

            <!-- EKSKUL -->
            <div class="field">
              <label>Ekstra Kurikuler</label>
              <select class="form-control" id="ekskul" required>
                <option disabled selected>Pilih Ekskul</option>
              </select>
            </div>

          </div>

          <div class="actions mt-4 d-flex gap-2">

            <button type="button" class="btn btn-success" onclick="submitData()">
              <i class="fa-solid fa-floppy-disk me-2"></i>
              Simpan
            </button>

            <button type="button" class="btn btn-primary" onclick="Back()">
              <i class="fa-solid fa-arrow-left me-2"></i>
              Back to Main Menu
            </button>

          </div>

        </div>
      </form>

    </div>
  </div>
</div>

<!-- JS External -->
<!-- <script src="assets/js/input-ekstra.js"></script> -->
  <script>
  // URL Cloudflare Worker kamu
  const API = "https://noisy-mode-b382.dewaa314.workers.dev";

  // Inisialisasi TomSelect
  let tsRombel = null;
  let tsSiswa  = null;
  let tsEkskul = null;

  // Fungsi universal untuk memanggil API melalui Cloudflare Worker
  async function api(action, data = {}) {
    const formData = new URLSearchParams();
    formData.append("action", action);

    Object.keys(data).forEach(key => {
      formData.append(key, data[key]);
    });

    try {
      const res = await fetch(API, {
        method: "POST",
        body: formData
      });

      if (!res.ok) throw new Error("Network response was not ok");

      return await res.json();
    } catch (err) {
      console.error("API Error:", err);
      Swal.fire("Error", "Gagal menghubungi server", "error");
      return null;
    }
  }

  // Fungsi yang dijalankan saat halaman load
  async function onLoad() {
    // showLoading(true);

    const rombel = await api("getRombel");
    if (rombel) populateRombel(rombel);

    const ekskul = await api("getEkskul");
    if (ekskul) populateEkskul(ekskul);

    // showLoading(false);
  }

  // Populate dropdown Rombel
  function populateRombel(list) {
    const el = document.getElementById("rombel");
    el.innerHTML = '<option value="" disabled selected>Pilih Kelas</option>';

    list.forEach(val => {
      el.innerHTML += `<option value="${val}">${val}</option>`;
    });

    tsRombel = new TomSelect(el, {
      plugins:["clear_button"]
    });

    tsRombel.on("change", async function(value){
      if(!value) return;
      // showLoading(true);
      const siswa = await api("getSiswaByRombel", {rombel:value});
      // showLoading(false);
      if(siswa) populateSiswa(siswa);
    });
  }

  // Populate dropdown Siswa
  function populateSiswa(list) {
    const el = document.getElementById("siswa");
    el.innerHTML = '<option value="" disabled selected>Pilih Siswa</option>';

    list.forEach(val => {
      el.innerHTML += `<option value="${val}">${val}</option>`;
    });

    tsSiswa = new TomSelect(el, {
      plugins:["clear_button"]
    });
  }

  // Populate dropdown Ekskul
  function populateEkskul(list) {
    const el = document.getElementById("ekskul");
    el.innerHTML = '<option value="" disabled selected>Pilih Ekskul</option>';

    list.forEach(item => {
      el.innerHTML += `<option value="${item.id}">${item.nama}</option>`;
    });

    tsEkskul = new TomSelect(el, {
      plugins:["clear_button"]
    });
  }

  // Submit data
  async function submitData() {
    const rombel = document.getElementById("rombel").value;
    const siswa = document.getElementById("siswa").value;
    const ekskulId = document.getElementById("ekskul").value;

    if(!rombel || !siswa || !ekskulId){
      Swal.fire("Data belum lengkap","","warning");
      return;
    }

    // showLoading(true);

    const res = await api("inputData", {
      rombel,
      siswa,
      ekskulId
    });

    // showLoading(false);

    if(!res) return;

    if(res.status === "duplicate"){
      Swal.fire("Data Sudah Ada",res.message,"warning");
      return;
    }

    Swal.fire("Berhasil",res.message,"success");
    location.reload();
  }

  // Loading overlay
  function showLoading(show){
    document.getElementById("loading").style.display = show ? "flex" : "none";
  }

  // Jalankan saat halaman load
  window.addEventListener("DOMContentLoaded", onLoad);
</script>

</body>
</html>
