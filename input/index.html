<body onload="onLoad()">

<div class="page-shell">
  <div class="page-content">
    <div class="page-wrap">

      <!-- LOGO -->
      <!-- <img class="logo" src="https://i.ibb.co.com/sdV75wcH/Logo.png"> -->

      <div class="brand">
        <p class="school-name">SMK BINTANG PERSADA DENPASAR</p>
        <p class="school-sub">Form Input Peserta Ekstrakurikuler</p>
      </div>

      <!-- HERO -->
      <div class="hero">
        <p class="hero-title">INPUT PESERTA EKSTRA</p>
        <p class="hero-sub"><strong>Semua Jenjang</strong></p>
        <div class="pill">
          <i class="fa-solid fa-circle-info"></i>
          Pastikan data diisi dengan benar
        </div>
      </div>

      <!-- FORM -->
      <form id="FormInput" class="card">
        <div class="card-head">
          <h3>
            <i class="fa-solid fa-id-card-clip me-2"></i>
            Identitas Siswa & Ekstra Pilihan
          </h3>
        </div>

        <div class="card-body">

          <div class="grid">

            <!-- KELAS -->
            <div class="field">
              <label>Kelas</label>
              <select class="form-control" id="rombel" required>
                <option disabled selected>Pilih Kelas</option>
              </select>
            </div>

            <!-- SISWA -->
            <div class="field">
              <label>Nama Siswa</label>
              <select class="form-control" id="siswa" required>
                <option disabled selected>Pilih Siswa</option>
              </select>
            </div>

            <!-- EKSKUL -->
            <div class="field">
              <label>Ekstra Kurikuler</label>
              <select class="form-control" id="ekskul" required>
                <option disabled selected>Pilih Ekskul</option>
              </select>
            </div>

          </div>

          <div class="actions mt-4 d-flex gap-2">

            <button type="button" class="btn btn-success" onclick="submitData()">
              <i class="fa-solid fa-floppy-disk me-2"></i>
              Simpan
            </button>

            <button type="button" class="btn btn-primary" onclick="Back()">
              <i class="fa-solid fa-arrow-left me-2"></i>
              Back to Main Menu
            </button>

          </div>

        </div>
      </form>

    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" style="display:none;"
     class="position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 d-flex align-items-center justify-content-center"
     style="z-index:9999;">
  <div class="bg-white p-4 rounded shadow text-center">
    <div class="spinner-border text-primary mb-3"></div>
    <div>Mohon tunggu sebentar...</div>
  </div>
</div>

<footer class="footer-minimal">
  <strong>© 2026 SMK Bintang Persada Denpasar</strong>
  <span class="footer-sub">Sistem Input Peserta Ekstra</span>
</footer>
